<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Zadanie drugie
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        body {
            padding: 30px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2 class="mb-4">Dodaj paczkę</h2>

        <!-- (f) formularz -->
        <form id="packageForm" class="needs-validation" novalidate>

            <div class="mb-3">
                <label class="form-label">Nazwa</label>
                <input type="text" class="form-control" id="name" maxlength="20" required>
                <div class="invalid-feedback">
                    Podaj nazwę (max 20 znaków)
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Szerokość</label>
                <div class="input-group">
                    <input type="number" class="form-control" id="width" min="1" max="1000" required>
                    <span class="input-group-text">cm</span>
                    <div class="invalid-feedback">
                        Wartość 1–1000
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Wysokość (cm)</label>
                <div class="input-group">
                    <input type="number" class="form-control" id="height" min="1" max="1000" required>
                    <span class="input-group-text">cm</span>
                    <div class="invalid-feedback">
                        Wartość 1–1000
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Głębokość (cm)</label>
                <div class="input-group">
                    <input type="number" class="form-control" id="depth" min="1" max="1000" required>
                    <span class="input-group-text">cm</span>
                    <div class="invalid-feedback">
                        Wartość 1–1000
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Confirm</button>
            <button type="reset" class="btn btn-secondary">Clear</button>

        </form>

        <hr class="my-4">

        <!-- (g) wyszukiwanie -->
        <input type="text" id="search" class="form-control mb-3" placeholder="Szukaj paczki...">

        <!-- tabela -->
        <table class="table">
            <thead>
                <tr>
                    <th>Nazwa</th>
                    <th>Szer.</th>
                    <th>Wys.</th>
                    <th>Głęb.</th>
                    <th>Objętość (m³)</th>
                </tr>
                <tr class="border-bottom border-3 border-black">
                </tr>
            </thead>

            <tbody id="tableBody"></tbody>

            <tfoot>
                <tr class="border-bottom border-3 border-black">
                </tr>
                <tr>
                    <th colspan="4">Suma</th>
                    <th id="totalVolume">0.00</th>
                </tr>
            </tfoot>
        </table>

    </div>
    <script src="script.js"></script>

</body>

</html>
