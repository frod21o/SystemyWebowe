<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadanie trzecie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <div class="row">

            <div class="col-4">
                <h4>Notatki</h4>
                <ul id="notesList" class="list-group"></ul>
                <button id="exportBtn" class="btn btn-sm btn-secondary mt-3">Export JSON</button>
                <input type="file" id="importInput" class="form-control mt-2" />
            </div>

            <div class="col-8">
                <h4>Edytor</h4>
                <form id="noteForm">
                    <div class="mb-3">
                        <input type="text" id="title" class="form-control" placeholder="Tytuł" required>
                    </div>
                    <div class="mb-3">
                        <textarea id="content" class="form-control" rows="6" placeholder="Treść"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Save</button>
                </form>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
