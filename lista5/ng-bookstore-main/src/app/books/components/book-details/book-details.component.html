<article class="container my-4">
  <div class="card shadow-sm p-4">

    <!-- Back link -->
    <a [routerLink]="['/books']" class="text-decoration-none mb-3">
      ← Back
    </a>

    <!-- Book header -->
    <div class="mb-3">
      <h2 class="fw-bold mb-1">
        {{ book.title }}
        <span class="text-muted fs-5">({{ book.year }})</span>
      </h2>
      <h5 class="text-secondary">{{ book.author }}</h5>
    </div>

    <!-- Description -->
    <p class="mt-3">
      {{ book.description }}
    </p>

    <hr class="my-4">

    <!-- Reviews section -->
    <section>
      <div *ngIf="reviews?.length; else noReviews">
        <bs-review-item
          *ngFor="let review of reviews"
          [review]="review">
        </bs-review-item>
      </div>

      <ng-template #noReviews>
        <p class="text-muted">No reviews</p>
      </ng-template>
    </section>

  </div>
</article>
